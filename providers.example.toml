# Catalogue of OCR providers + secrets.
# Copy this file to providers.toml (gitignored) and fill in your own values.
# Day-to-day choices (vault, active model, strategies) are set from the UI, not here —
# this is only the starting point and where API keys live.

[[providers]]
id = "ollama"
display_name = "Ollama (local)"
kind = "local"
base_url = "http://localhost:11434/v1"
default_model = "qwen3-vl:4b"

[[providers]]
id = "lmstudio"
display_name = "LM Studio (local)"
kind = "local"
base_url = "http://localhost:1234/v1"

[[providers]]
id = "gemini"
display_name = "Gemini (cloud, free tier)"
kind = "cloud"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
api_key = "PUT_YOUR_AI_STUDIO_API_KEY_HERE"
default_model = "gemini-2.0-flash"

[[providers]]
id = "claude"
display_name = "Claude (cloud, subscription)"
kind = "cloud"
# No base_url or api_key: uses claude-agent-sdk authenticated by Claude Code.
default_model = "claude-sonnet-4-6"
