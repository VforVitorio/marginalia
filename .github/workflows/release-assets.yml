name: release-assets

# Manual repair: build the frontend and (re)attach it to a release as
# frontend-dist.zip, so the installer (scripts/install.*) can fetch it and end
# users never need Node. The automatic path lives in release-please.yml (the same
# job that creates the release); this workflow is a manual fallback to re-attach
# the asset to any tag, e.g. if a release ever ends up without it.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach frontend-dist.zip to (e.g. v1.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  frontend-dist:
    name: frontend-dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: cd frontend && zip -r ../frontend-dist.zip dist
      - name: Attach to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.tag }}" frontend-dist.zip --clobber
