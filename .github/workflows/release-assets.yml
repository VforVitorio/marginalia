name: release-assets

# Build the frontend and attach it to each published release as frontend-dist.zip,
# so the installer (scripts/install.*) can fetch it and end users never need Node.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  frontend-dist:
    name: frontend-dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: cd frontend && zip -r ../frontend-dist.zip dist
      - name: Attach to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" frontend-dist.zip --clobber
